<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero GPX Route</title>
    <link rel="icon" type="image/svg+xml" href="zero-favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-main">
                <h1>Zero GPX Route</h1>
                <p>Tạo đường chạy giả lập nhanh, chính xác và dễ kiểm soát.</p>
            </div>
            <nav class="header-links" aria-label="External links">
                <a href="https://github.com/ndanhkhoi/zero-gpx-route" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-github" aria-hidden="true"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://github.com/ndanhkhoi/zero-gpx-route/blob/main/USER_GUIDE.md" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-book" aria-hidden="true"></i>
                    <span>Hướng dẫn</span>
                </a>
            </nav>
        </header>

        <main class="workspace" aria-label="Route generator workspace">
            <section class="map-section panel" aria-label="Map canvas">
                <div class="map-toolbar">
                    <span class="toolbar-label"><i class="fas fa-map-location-dot" aria-hidden="true"></i> Bản đồ</span>
                    <span id="draw-status" class="draw-status" aria-live="polite">Sẵn sàng</span>
                </div>
                <div id="map"></div>
            </section>

            <aside class="control-panel panel" aria-label="Route controls">
                <section class="panel-section quick-actions">
                    <h2><i class="fas fa-bolt" aria-hidden="true"></i> Thao tác nhanh</h2>
                    <div class="actions-grid">
                        <button id="add-point" class="btn action-btn action-primary" type="button">
                            <i class="fas fa-draw-polygon" aria-hidden="true"></i>
                            <span class="btn-text">Bắt đầu vẽ</span>
                        </button>
                        <button id="preview-route" class="btn action-btn action-secondary" type="button" disabled>
                            <i class="fas fa-eye" aria-hidden="true"></i>
                            <span class="btn-text">Xem trước</span>
                        </button>
                        <button id="export-gpx" class="btn action-btn action-secondary" type="button" disabled>
                            <i class="fas fa-file-export" aria-hidden="true"></i>
                            <span class="btn-text">Xuất GPX</span>
                        </button>
                        <button id="reset-app" class="btn action-btn action-ghost" type="button">
                            <i class="fas fa-rotate-left" aria-hidden="true"></i>
                            <span class="btn-text">Làm lại</span>
                        </button>
                    </div>
                </section>

                <section class="panel-section route-info" aria-label="Route summary">
                    <h2><i class="fas fa-chart-line" aria-hidden="true"></i> Tổng quan route</h2>
                    <div class="metrics">
                        <div id="total-distance" class="metric" aria-live="polite">Tổng khoảng cách: 0 km</div>
                        <div id="total-time" class="metric" aria-live="polite">Tổng thời gian: 0 phút</div>
                    </div>
                </section>

                <section class="panel-section settings" aria-label="Route settings">
                    <h2><i class="fas fa-sliders" aria-hidden="true"></i> Thông số</h2>

                    <div class="setting-item">
                        <label for="route-type" class="form-label">Loại hoạt động</label>
                        <select id="route-type" class="form-select">
                            <option value="run">Chạy bộ</option>
                            <option value="walk">Đi bộ</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <label for="speed" class="form-label">Pace (phút/km)</label>
                        <input type="number" id="speed" min="1" max="30" value="9.6" step="0.01" class="form-control">
                    </div>

                    <div class="setting-item">
                        <label for="duplicate-count" class="form-label">Số vòng lặp lại</label>
                        <input type="number" id="duplicate-count" min="1" max="100" value="1" step="1" class="form-control">
                    </div>

                    <div class="setting-item setting-row">
                        <div>
                            <label for="min-offset" class="form-label">Offset nhỏ nhất (m)</label>
                            <input type="number" id="min-offset" min="0.01" max="10" value="0.05" step="0.01" class="form-control">
                        </div>
                        <div>
                            <label for="max-offset" class="form-label">Offset lớn nhất (m)</label>
                            <input type="number" id="max-offset" min="0.01" max="10" value="0.2" step="0.01" class="form-control">
                        </div>
                    </div>

                    <div class="setting-item">
                        <label for="elevation" class="form-label">Độ cao mặc định (m)</label>
                        <input type="number" id="elevation" min="0" value="10" step="1" class="form-control">
                    </div>

                    <div class="setting-item">
                        <label for="start-time" class="form-label">Thời gian bắt đầu</label>
                        <input type="datetime-local" id="start-time" class="form-control">
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content dark-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="alertModalLabel"><i class="fas fa-circle-info me-2" aria-hidden="true"></i>Thông báo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="alert-message"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn action-btn action-primary" id="alert-ok" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content dark-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel"><i class="fas fa-circle-question me-2" aria-hidden="true"></i>Xác nhận</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="confirm-message"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn action-btn action-ghost" id="confirm-cancel" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn action-btn action-primary" id="confirm-ok">Đồng ý</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/dayjs@1.11.9/dayjs.min.js"></script>
    <script src="https://unpkg.com/dayjs@1.11.9/plugin/utc.js"></script>
    <script src="https://unpkg.com/dayjs@1.11.9/plugin/timezone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js?v=1.0.2"></script>
</body>
</html>

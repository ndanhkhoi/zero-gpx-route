<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero GPX Route</title>
    <link rel="icon" type="image/svg+xml" href="/zero-favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="max-w-[1440px] mx-auto p-4 lg:p-7 grid gap-6">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-start gap-3 p-6 border border-[var(--color-border)] rounded-2xl bg-gradient-to-br from-[rgba(24,34,54,0.95)] to-[rgba(11,18,32,0.95)] shadow-[0_20px_40px_rgba(0,0,0,0.35)]">
            <div>
                <h1 class="text-[clamp(1.8rem,4vw,2.6rem)] leading-none"><span class="text-[var(--color-primary)]">Zero</span> GPX <span class="text-[var(--color-primary)]">Route</span></h1>
                <p class="mt-2.5 text-[var(--color-slate-400)]">Tạo đường chạy giả lập nhanh, chính xác và dễ kiểm soát.</p>
            </div>
            <nav class="flex flex-wrap justify-start sm:justify-end gap-3" aria-label="External links">
                <a href="https://github.com/ndanhkhoi/zero-gpx-route" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center gap-2 px-3.5 py-2.5 border border-[var(--color-border)] rounded-full text-[var(--color-slate-100)] no-underline bg-[rgba(24,34,54,0.85)] transition-all duration-200 hover:text-white hover:border-[var(--color-primary)] hover:bg-[rgba(249,115,22,0.12)]">
                    <i class="fab fa-github" aria-hidden="true"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://github.com/ndanhkhoi/zero-gpx-route/blob/main/USER_GUIDE.md" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center gap-2 px-3.5 py-2.5 border border-[var(--color-border)] rounded-full text-[var(--color-slate-100)] no-underline bg-[rgba(24,34,54,0.85)] transition-all duration-200 hover:text-white hover:border-[var(--color-primary)] hover:bg-[rgba(249,115,22,0.12)]">
                    <i class="fas fa-book" aria-hidden="true"></i>
                    <span>Hướng dẫn</span>
                </a>
            </nav>
        </header>

        <!-- Workspace -->
        <main class="grid grid-cols-1 lg:grid-cols-[minmax(0,1.45fr)_minmax(320px,420px)] gap-6" aria-label="Route generator workspace">
            <!-- Map -->
            <section class="p-4 grid gap-3 border border-[var(--color-border)] rounded-2xl bg-[rgba(18,26,43,0.96)] shadow-[0_20px_40px_rgba(0,0,0,0.35)]" aria-label="Map canvas">
                <div class="flex flex-wrap justify-between items-center gap-2">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="inline-flex items-center gap-2 font-semibold text-[var(--color-slate-400)]">
                            <i class="fas fa-map-location-dot" aria-hidden="true"></i> Bản đồ
                        </span>
                        <span class="text-[var(--color-border)]">|</span>
                        <span class="text-xs font-medium text-[var(--color-slate-500)]">Chế độ vẽ</span>
                        <div class="draw-mode-toggle" id="draw-mode-group">
                            <button type="button" data-mode="click"
                                    class="draw-mode-btn"
                                    title="Click từng điểm">
                                <i class="fas fa-mouse-pointer"></i>
                                <span>Click</span>
                            </button>
                            <button type="button" data-mode="freehand"
                                    class="draw-mode-btn active"
                                    title="Vẽ tự do">
                                <i class="fas fa-pencil"></i>
                                <span>Tự do</span>
                            </button>
                        </div>
                        <button id="add-point" type="button"
                                class="toolbar-btn toolbar-btn-primary"
                                title="Bắt đầu vẽ">
                            <i class="fas fa-draw-polygon" aria-hidden="true"></i>
                            <span>Bắt đầu vẽ</span>
                        </button>
                        <button id="reset-app" type="button"
                                class="toolbar-btn toolbar-btn-ghost"
                                title="Làm lại">
                            <i class="fas fa-rotate-left" aria-hidden="true"></i>
                            <span>Làm lại</span>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="total-distance" class="text-sm font-semibold text-[var(--color-slate-300)]" aria-live="polite">0 km</span>
                        <span class="text-[var(--color-border)]">|</span>
                        <span id="total-time" class="text-sm font-semibold text-[var(--color-slate-300)]" aria-live="polite">0 phút</span>
                        <span id="draw-status" class="inline-flex items-center justify-center rounded-full px-2.5 py-1 bg-[rgba(34,197,94,0.14)] text-[#86efac] text-xs font-semibold" aria-live="polite">Sẵn sàng</span>
                        <button id="export-gpx" type="button" disabled
                                class="toolbar-btn toolbar-btn-export"
                                title="Xuất GPX">
                            <i class="fas fa-file-export" aria-hidden="true"></i>
                            <span>Xuất GPX</span>
                        </button>
                    </div>
                </div>
                <div id="map" class="w-full min-h-[620px] h-[clamp(420px,68vh,760px)] rounded-xl border border-[var(--color-border)]"></div>
            </section>

            <!-- Control Panel -->
            <aside class="p-4 grid gap-4 border border-[var(--color-border)] rounded-2xl bg-[rgba(18,26,43,0.96)] shadow-[0_20px_40px_rgba(0,0,0,0.35)]" aria-label="Route controls">
                <!-- Settings -->
                <section class="grid gap-2" aria-label="Route settings">
                    <h2 class="text-base inline-flex items-center gap-2.5">
                        <i class="fas fa-sliders text-[var(--color-primary)]" aria-hidden="true"></i> Thông số
                    </h2>

                    <div class="grid gap-2">
                        <label class="text-[var(--color-slate-400)] font-medium">Loại hoạt động</label>
                        <div class="route-type-toggle" id="route-type-group">
                            <button type="button" data-value="run" class="route-type-btn active">
                                <i class="fas fa-person-running" aria-hidden="true"></i>
                                <span>Chạy bộ</span>
                            </button>
                            <button type="button" data-value="walk" class="route-type-btn">
                                <i class="fas fa-person-walking" aria-hidden="true"></i>
                                <span>Đi bộ</span>
                            </button>
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label for="start-time" class="text-[var(--color-slate-400)] font-medium">Thời gian bắt đầu</label>
                        <input type="datetime-local" id="start-time"
                               class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                    </div>

                    <div class="grid gap-2">
                        <label for="speed" class="text-[var(--color-slate-400)] font-medium">Pace (phút/km)</label>
                        <input type="number" id="speed" min="1" max="30" value="9.6" step="0.01"
                               class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                    </div>

                    <div class="grid gap-2">
                        <label for="duplicate-count" class="text-[var(--color-slate-400)] font-medium">Số vòng lặp lại</label>
                        <input type="number" id="duplicate-count" min="1" max="100" value="1" step="1"
                               class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                    </div>

                    <div class="grid grid-cols-2 gap-2.5">
                        <div class="grid gap-2">
                            <label for="min-offset" class="text-[var(--color-slate-400)] font-medium">Offset nhỏ nhất (m)</label>
                            <input type="number" id="min-offset" min="0.01" max="10" value="0.05" step="0.01"
                                   class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                        </div>
                        <div class="grid gap-2">
                            <label for="max-offset" class="text-[var(--color-slate-400)] font-medium">Offset lớn nhất (m)</label>
                            <input type="number" id="max-offset" min="0.01" max="10" value="0.2" step="0.01"
                                   class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label for="elevation" class="text-[var(--color-slate-400)] font-medium">Độ cao mặc định (m)</label>
                        <input type="number" id="elevation" min="0" value="10" step="1"
                               class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>

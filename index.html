<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero GPX Route</title>
    <link rel="icon" type="image/svg+xml" href="/zero-favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Floating Header -->
    <header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-5 py-3 bg-[var(--color-surface)] border-b border-[var(--color-border)] shadow-[0_4px_30px_rgba(0,0,0,0.6)]">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-bold leading-none whitespace-nowrap"><span class="text-[var(--color-primary)]">Zero</span> GPX <span class="text-[var(--color-primary)]">Route</span></h1>
        </div>
        <nav class="flex items-center gap-2" aria-label="External links">
            <a href="https://github.com/ndanhkhoi/zero-gpx-route" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[var(--color-slate-300)] no-underline transition-all duration-200 hover:text-white hover:bg-[rgba(249,115,22,0.12)] cursor-pointer">
                <i class="fab fa-github text-base" aria-hidden="true"></i>
                <span class="hidden sm:inline text-sm">GitHub</span>
            </a>
            <a href="https://github.com/ndanhkhoi/zero-gpx-route/blob/main/USER_GUIDE.md" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[var(--color-slate-300)] no-underline transition-all duration-200 hover:text-white hover:bg-[rgba(249,115,22,0.12)] cursor-pointer">
                <i class="fas fa-book text-base" aria-hidden="true"></i>
                <span class="hidden sm:inline text-sm">Hướng dẫn</span>
            </a>
        </nav>
    </header>

    <div class="max-w-[1800px] mx-auto p-3 pt-16 lg:p-6 lg:pt-[72px] grid gap-5">

        <!-- Workspace -->
        <main class="grid grid-cols-1 lg:grid-cols-[minmax(0,1.45fr)_minmax(320px,420px)] gap-6" aria-label="Route generator workspace">
            <!-- Map -->
            <section class="p-4 grid gap-3 rounded-2xl bg-[rgba(18,26,43,0.96)] border border-[var(--color-border)] shadow-[0_8px_40px_rgba(0,0,0,0.5)]" aria-label="Map canvas">
                <div class="flex items-center gap-2 font-semibold text-[var(--color-slate-100)]">
                    <i class="fas fa-map-location-dot text-[var(--color-primary)]" aria-hidden="true"></i> Bản đồ
                </div>
                <div class="flex flex-wrap items-center justify-between gap-2">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="text-xs font-medium text-[var(--color-slate-500)]">Chế độ vẽ</span>
                        <div class="draw-mode-toggle" id="draw-mode-group">
                            <button type="button" data-mode="click"
                                    class="draw-mode-btn"
                                    title="Click từng điểm">
                                <i class="fas fa-arrow-pointer"></i>
                                <span class="btn-label">Click</span>
                            </button>
                            <button type="button" data-mode="freehand"
                                    class="draw-mode-btn active"
                                    title="Vẽ tự do">
                                <i class="fas fa-pencil"></i>
                                <span class="btn-label">Tự do</span>
                            </button>
                        </div>
                        <button id="add-point" type="button"
                                class="toolbar-btn toolbar-btn-primary"
                                title="Bắt đầu vẽ">
                            <i class="fas fa-play" aria-hidden="true"></i>
                            <span class="btn-label">Bắt đầu vẽ</span>
                        </button>
                        <button id="reset-app" type="button"
                                class="toolbar-btn toolbar-btn-ghost"
                                title="Làm lại">
                            <i class="fas fa-rotate-left" aria-hidden="true"></i>
                            <span class="btn-label">Làm lại</span>
                        </button>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <span id="total-distance" class="text-sm font-semibold text-[var(--color-slate-300)]" aria-live="polite">0 km</span>
                        <span class="text-[var(--color-border)]">|</span>
                        <span id="total-time" class="text-sm font-semibold text-[var(--color-slate-300)]" aria-live="polite">0 phút</span>
                        <span id="draw-status" class="inline-flex items-center justify-center rounded-full px-2.5 py-1 bg-[rgba(34,197,94,0.14)] text-[#86efac] text-xs font-semibold" aria-live="polite">Sẵn sàng</span>
                    </div>
                </div>
                <div id="map" class="relative w-full min-h-[620px] h-[clamp(420px,75vh,900px)] rounded-xl border border-[var(--color-border)]">
                    <div id="geocoder" class="geocoder-control">
                        <div class="geocoder-wrapper">
                            <i class="fas fa-magnifying-glass geocoder-icon" aria-hidden="true"></i>
                            <input type="text" class="geocoder-input" placeholder="Tìm địa điểm..." autocomplete="off">
                            <button type="button" class="geocoder-clear" aria-label="Xóa">
                                <i class="fas fa-xmark"></i>
                            </button>
                        </div>
                        <div class="geocoder-results"></div>
                    </div>
                </div>
            </section>

            <!-- Control Panel -->
            <aside class="p-4 grid gap-3 content-start rounded-2xl bg-[rgba(18,26,43,0.96)] border border-[var(--color-border)] shadow-[0_8px_40px_rgba(0,0,0,0.5)] lg:max-h-[calc(75vh+120px)] lg:overflow-y-auto" aria-label="Route controls">
                <!-- Settings -->
                <section class="grid gap-4 pb-3 mb-1 border-b border-[var(--color-border)]" aria-label="Route settings">
                    <h2 class="text-base inline-flex items-center gap-2.5">
                        <i class="fas fa-sliders text-[var(--color-primary)]" aria-hidden="true"></i> Thông số
                        <span class="tooltip-trigger">
                            <i class="fas fa-circle-question text-xs text-[var(--color-slate-500)] cursor-help" aria-hidden="true"></i>
                            <span class="settings-tooltip">Pace: tốc độ chạy/đi bộ (phút/km)&#10;Số vòng: số lần lặp lại lộ trình&#10;Độ lệch: khoảng cách lệch ngang (m) để tạo hiệu ứng tự nhiên&#10;Độ cao: giá trị elevation mặc định cho GPX</span>
                        </span>
                    </h2>

                    <div class="grid gap-2">
                        <label class="text-[12px] text-[var(--color-slate-400)] font-medium">Loại hoạt động</label>
                        <div class="route-type-toggle" id="route-type-group">
                            <button type="button" data-value="run" class="route-type-btn active">
                                <i class="fas fa-person-running" aria-hidden="true"></i>
                                <span>Chạy bộ</span>
                            </button>
                            <button type="button" data-value="walk" class="route-type-btn">
                                <i class="fas fa-person-walking" aria-hidden="true"></i>
                                <span>Đi bộ</span>
                            </button>
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label for="start-time" class="text-[12px] text-[var(--color-slate-400)] font-medium">Thời gian bắt đầu</label>
                        <input type="datetime-local" id="start-time"
                               class="rounded-[10px] border border-[var(--color-border)] bg-[rgba(11,18,32,0.7)] text-[var(--color-slate-100)] min-h-11 px-3 focus:border-[var(--color-primary)] focus:bg-[rgba(11,18,32,0.86)] focus:text-white focus:outline-none focus:ring-0">
                    </div>

                    <div class="grid gap-2">
                        <label class="text-[12px] text-[var(--color-slate-400)] font-medium">Pace (phút/km)</label>
                        <div class="slider-row">
                            <input type="range" id="speed" min="1" max="30" value="9.6" step="0.1" class="slider-input">
                            <input type="number" id="speed-value" value="9.6" min="1" max="30" step="0.1" class="slider-value-input">
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label class="text-[12px] text-[var(--color-slate-400)] font-medium">Số vòng lặp lại</label>
                        <div class="slider-row">
                            <input type="range" id="duplicate-count" min="1" max="100" value="1" step="1" class="slider-input">
                            <input type="number" id="duplicate-count-value" value="1" min="1" max="100" step="1" class="slider-value-input">
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label class="text-[12px] text-[var(--color-slate-400)] font-medium">Độ lệch nhỏ nhất (m)</label>
                        <div class="slider-row">
                            <input type="range" id="min-offset" min="0.01" max="10" value="0.05" step="0.01" class="slider-input">
                            <input type="number" id="min-offset-value" value="0.05" min="0.01" max="10" step="0.01" class="slider-value-input">
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label class="text-[12px] text-[var(--color-slate-400)] font-medium">Độ lệch lớn nhất (m)</label>
                        <div class="slider-row">
                            <input type="range" id="max-offset" min="0.01" max="10" value="0.2" step="0.01" class="slider-input">
                            <input type="number" id="max-offset-value" value="0.2" min="0.01" max="10" step="0.01" class="slider-value-input">
                        </div>
                    </div>

                    <div class="grid gap-2">
                        <label class="text-[12px] text-[var(--color-slate-400)] font-medium">Độ cao mặc định (m)</label>
                        <div class="slider-row">
                            <input type="range" id="elevation" min="0" max="8888" value="10" step="1" class="slider-input">
                            <input type="number" id="elevation-value" value="10" min="0" max="8888" step="1" class="slider-value-input">
                        </div>
                    </div>
                </section>

                <button id="export-gpx" type="button" disabled
                        class="mt-2 flex items-center justify-center gap-2 w-full min-h-11 rounded-xl bg-[var(--color-primary)] border border-[var(--color-primary)] text-white font-semibold text-sm transition-all duration-200 hover:bg-[var(--color-primary-hover)] hover:border-[var(--color-primary-hover)] disabled:opacity-40 disabled:cursor-not-allowed">
                    <i class="fas fa-file-export" aria-hidden="true"></i>
                    <span>Xuất GPX</span>
                </button>
            </aside>
        </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
